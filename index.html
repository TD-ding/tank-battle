<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>坦克大战</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #111;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Courier New', monospace;
  color: #fff;
}
#gameContainer {
  position: relative;
}
canvas {
  display: block;
  border: 2px solid #555;
}
#overlay {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.85);
  z-index: 10;
}
#overlay .title {
  font-size: 52px;
  font-weight: bold;
  color: #f5c842;
  margin-bottom: 8px;
  text-shadow: 0 0 20px rgba(245,200,66,0.6), 2px 2px 4px #000;
  letter-spacing: 8px;
}
#overlay .subtitle {
  font-size: 30px;
  font-weight: bold;
  color: #e74c3c;
  margin-bottom: 12px;
  text-shadow: 0 0 12px rgba(231,76,60,0.5), 1px 1px 3px #000;
}
#overlay .win-title {
  font-size: 52px;
  font-weight: bold;
  color: #4a9;
  margin-bottom: 8px;
  text-shadow: 0 0 20px rgba(68,170,153,0.6), 2px 2px 4px #000;
}
#overlay .info-box {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px;
  padding: 16px 28px;
  margin: 16px 0;
  text-align: left;
}
#overlay .info-box p {
  font-size: 15px;
  color: #ccc;
  margin: 5px 0;
  line-height: 1.6;
}
#overlay .info-box span.key {
  display: inline-block;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 4px;
  padding: 1px 8px;
  font-size: 13px;
  color: #f5c842;
  margin: 0 2px;
}
#overlay .score-line {
  font-size: 18px;
  color: #f5c842;
  margin: 6px 0;
}
#overlay .start-hint {
  margin-top: 24px;
  font-size: 18px;
  color: #f5c842;
  animation: blink 1.2s infinite;
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.25; }
}
#errorToast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #e74c3c;
  color: #fff;
  padding: 10px 24px;
  border-radius: 6px;
  font-size: 14px;
  z-index: 100;
  display: none;
  box-shadow: 0 2px 8px rgba(0,0,0,0.5);
}
#pauseOverlay {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: none;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.6);
  z-index: 8;
}
#pauseOverlay .pause-text {
  font-size: 48px;
  color: #f5c842;
  text-shadow: 0 0 16px rgba(245,200,66,0.5);
  letter-spacing: 12px;
  margin-bottom: 12px;
}
#pauseOverlay .pause-hint {
  font-size: 16px;
  color: #aaa;
}
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>
  <div id="errorToast"></div>
  <div id="pauseOverlay">
    <div class="pause-text">暂停</div>
    <div class="pause-hint">按 P 或 Esc 继续</div>
  </div>
  <div id="overlay">
    <h1>坦克大战</h1>
    <p>WASD / 方向键 — 移动</p>
    <p>空格键 — 射击</p>
    <p class="start-hint">按 Enter 开始游戏</p>
  </div>
</div>

<script>
// ========== 主题配置 ==========
const THEME = {
  bg: '#000',
  player: { body: '#4a9', track: '#387', turret: '#5ba', barrel: '#6dc' },
  enemy:  { body: '#c44', track: '#922', turret: '#d55', barrel: '#e66' },
  bullet: { player: '#ff0', enemy: '#f80' },
  brick:  { main: '#b45a2a', dark: '#8a3a1a', border: '#6a2a0a' },
  steel:  { frame: '#aaa', mid: '#888', highlight: '#ccc' },
  water:  { base: '#26c', wave: '#38e' },
  base:   { main: '#f5c842', inner: '#e0a800' },
  hud:    { color: '#f5c842', shadow: '#000' },
  overlay: { title: '#f5c842', subtitle: '#e74c3c' },
  explosion: ['#fff', '#fa0', '#f40'],
};

// ========== 常量 ==========
const TILE = 32;
const COLS = 26;
const ROWS = 26;
const W = COLS * TILE;
const H = ROWS * TILE;
const TANK_SIZE = 28;
const BULLET_SIZE = 6;
const BULLET_SPEED = 300;
const PLAYER_SPEED = 150;
const ENEMY_SPEED = 90;
const ENEMY_SHOOT_INTERVAL = 1500;
const MAX_ENEMIES = 4;
const TOTAL_ENEMIES = 20;
const RESPAWN_DELAY = 2000;
const MAX_PLAYER_BULLETS = 2;
const INVINCIBLE_TIME = 2000;
const MAX_DT = 50;
const CLEANUP_INTERVAL = 5000;

const DIR = { UP: 0, RIGHT: 1, DOWN: 2, LEFT: 3 };
const DX = [0, 1, 0, -1];
const DY = [-1, 0, 1, 0];

const TILE_EMPTY = 0;
const TILE_BRICK = 1;
const TILE_STEEL = 2;
const TILE_WATER = 3;
const TILE_BASE = 4;

// ========== Canvas ==========
const canvas = document.getElementById('gameCanvas');
canvas.width = W;
canvas.height = H;
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const pauseOverlay = document.getElementById('pauseOverlay');
const errorToast = document.getElementById('errorToast');
let errorTimer = null;

function showError(msg) {
  errorToast.textContent = msg;
  errorToast.style.display = 'block';
  if (errorTimer) clearTimeout(errorTimer);
  errorTimer = setTimeout(() => { errorToast.style.display = 'none'; }, 3000);
}

window.onerror = (msg) => { showError(msg); };

// 地图离屏缓存
let mapCanvas = null;
let mapDirty = true;

// ========== 地图 ==========
// 0=空, 1=砖墙, 2=钢墙, 3=水, 4=基地
const MAP_TEMPLATE = [
  "00000000000000000000000000",
  "00000000000000000000000000",
  "00110011001100110011001100",
  "00110011001100110011001100",
  "00110011001100110011001100",
  "00110011001100110011001100",
  "00110011002200110011001100",
  "00110011002200110011001100",
  "00110011000000110011001100",
  "00110011000000110011001100",
  "00000000000000000000000000",
  "00000000000000000000000000",
  "00110000000000000000110000",
  "00110000000000000000110000",
  "00000000110011000000000000",
  "00000000110011000000000000",
  "00110000000000000000110000",
  "00110000000000000000110000",
  "00110011000000110011001100",
  "00110011000000110011001100",
  "00110011001100110011001100",
  "00110011001100110011001100",
  "00000011001100110000000000",
  "00000011001100110000000000",
  "00000000110011000000000000",
  "00000000110011000000000000",
];

let map = [];
let waterTiles = [];
function initMap() {
  map = [];
  waterTiles = [];
  for (let r = 0; r < ROWS; r++) {
    map[r] = [];
    for (let c = 0; c < COLS; c++) {
      const ch = MAP_TEMPLATE[r]?.[c] || '0';
      const t = parseInt(ch);
      map[r][c] = t;
      if (t === TILE_WATER) waterTiles.push({ r, c });
    }
  }
  mapDirty = true;
  // 基地：底部中间
  map[ROWS - 2][COLS / 2 - 1] = TILE_BASE;
  map[ROWS - 2][COLS / 2] = TILE_BASE;
  map[ROWS - 1][COLS / 2 - 1] = TILE_BASE;
  map[ROWS - 1][COLS / 2] = TILE_BASE;
  // 基地周围砖墙保护（完整U形）
  const bx = COLS / 2 - 1;
  const by = ROWS - 4;
  // 顶部一排
  for (let c = bx - 1; c <= bx + 2; c++) {
    if (map[by] && map[by][c] === TILE_EMPTY) map[by][c] = TILE_BRICK;
  }
  // 两侧竖排
  for (let r = by + 1; r < ROWS - 1; r++) {
    if (map[r]) {
      if (map[r][bx - 1] === TILE_EMPTY) map[r][bx - 1] = TILE_BRICK;
      if (map[r][bx + 2] === TILE_EMPTY) map[r][bx + 2] = TILE_BRICK;
    }
  }
}

// ========== 游戏状态 ==========
let gameState = 'menu'; // menu, playing, paused, gameover, win
let score = 0;
let enemiesKilled = 0;
let enemiesSpawned = 0;
let lastEnemySpawn = 0;
let lastCleanup = 0;
let playerLives = 3;

let player = null;
let enemies = [];
let bullets = [];
let explosions = [];
let keys = {};

// ========== 工具函数 ==========
function tileCenter(col, row) {
  return { x: col * TILE + TILE / 2, y: row * TILE + TILE / 2 };
}

function snapToGrid(val) {
  return Math.round((val - TILE / 2) / TILE) * TILE + TILE / 2;
}

function rectOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

function canMoveTo(x, y, size, exclude) {
  const half = size / 2;
  const left = x - half;
  const top = y - half;
  const right = x + half;
  const bottom = y + half;

  if (left < 0 || top < 0 || right > W || bottom > H) return false;

  const c1 = Math.floor(left / TILE);
  const c2 = Math.floor((right - 0.01) / TILE);
  const r1 = Math.floor(top / TILE);
  const r2 = Math.floor((bottom - 0.01) / TILE);

  for (let r = r1; r <= r2; r++) {
    for (let c = c1; c <= c2; c++) {
      if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return false;
      const t = map[r][c];
      if (t === TILE_BRICK || t === TILE_STEEL || t === TILE_WATER || t === TILE_BASE) return false;
    }
  }

  // 检查与其他坦克碰撞
  const allTanks = [player, ...enemies].filter(t => t && t !== exclude && t.alive);
  for (const tank of allTanks) {
    if (rectOverlap(x - half, y - half, size, size, tank.x - TANK_SIZE / 2, tank.y - TANK_SIZE / 2, TANK_SIZE, TANK_SIZE)) {
      return false;
    }
  }
  return true;
}

// ========== 坦克类 ==========
class Tank {
  constructor(x, y, dir, isPlayer) {
    this.x = x;
    this.y = y;
    this.dir = dir;
    this.isPlayer = isPlayer;
    this.alive = true;
    this.speed = isPlayer ? PLAYER_SPEED : ENEMY_SPEED;
    this.cooldown = 0;
    this.shootInterval = isPlayer ? 300 : ENEMY_SHOOT_INTERVAL;
    this.shootVariation = isPlayer ? 0 : 0.6;
    this.invincible = 0;
    // AI
    this.aiDirTimer = 0;
    this.aiDirInterval = 2000 + Math.random() * 2000;
    this.triedDirs = [];
  }

  move(dir, dt) {
    this.dir = dir;
    const step = this.speed * dt;
    let nx = this.x + DX[dir] * step;
    let ny = this.y + DY[dir] * step;

    // 坦克在转向时对齐网格
    if (dir === DIR.UP || dir === DIR.DOWN) {
      nx = snapToGrid(nx);
    } else {
      ny = snapToGrid(ny);
    }

    if (canMoveTo(nx, ny, TANK_SIZE, this)) {
      this.x = nx;
      this.y = ny;
    } else {
      // 尝试不snap
      nx = this.x + DX[dir] * step;
      ny = this.y + DY[dir] * step;
      if (canMoveTo(nx, ny, TANK_SIZE, this)) {
        this.x = nx;
        this.y = ny;
      }
    }
  }

  shoot() {
    if (this.cooldown > 0) return;
    if (this.isPlayer) {
      const activeBullets = bullets.filter(b => b.alive && b.owner === 'player');
      if (activeBullets.length >= MAX_PLAYER_BULLETS) return;
    } else {
      const myBullets = bullets.filter(b => b.alive && b.owner === 'enemy' && b.tankId === this);
      if (myBullets.length >= 1) return;
    }
    this.cooldown = this.shootInterval * (1 + (Math.random() - 0.5) * this.shootVariation);
    const bx = this.x + DX[this.dir] * (TANK_SIZE / 2 + 2);
    const by = this.y + DY[this.dir] * (TANK_SIZE / 2 + 2);
    bullets.push({
      x: bx, y: by,
      dir: this.dir,
      owner: this.isPlayer ? 'player' : 'enemy',
      tankId: this,
      alive: true
    });
  }

  update(dt) {
    if (this.cooldown > 0) this.cooldown -= dt;
    if (this.invincible > 0) this.invincible -= dt;
  }

  draw() {
    if (!this.alive) return;
    // 无敌闪烁：半透明交替
    if (this.invincible > 0) {
      ctx.globalAlpha = Math.floor(this.invincible / 80) % 2 === 0 ? 0.3 : 0.85;
    }
    const x = this.x - TANK_SIZE / 2;
    const y = this.y - TANK_SIZE / 2;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.dir * Math.PI / 2);
    ctx.translate(-this.x, -this.y);

    // 车体
    const c = this.isPlayer ? THEME.player : THEME.enemy;
    ctx.fillStyle = c.body;
    ctx.fillRect(x + 2, y + 2, TANK_SIZE - 4, TANK_SIZE - 4);

    // 履带
    ctx.fillStyle = c.track;
    ctx.fillRect(x, y + 2, 5, TANK_SIZE - 4);
    ctx.fillRect(x + TANK_SIZE - 5, y + 2, 5, TANK_SIZE - 4);

    // 炮塔
    ctx.fillStyle = c.turret;
    ctx.fillRect(x + TANK_SIZE / 2 - 5, y + TANK_SIZE / 2 - 5, 10, 10);

    // 炮管
    ctx.fillStyle = c.barrel;
    ctx.fillRect(x + TANK_SIZE / 2 - 2, y - 2, 4, TANK_SIZE / 2 + 2);

    ctx.restore();
    ctx.globalAlpha = 1;
  }
}

// ========== 爆炸效果 ==========
class Explosion {
  constructor(x, y, big) {
    this.x = x;
    this.y = y;
    this.big = big;
    this.frame = 0;
    this.maxFrame = big ? 30 : 14;
    this.alive = true;
    this.particles = [];
    if (big) {
      for (let i = 0; i < 12; i++) {
        const angle = (Math.PI * 2 / 12) * i + Math.random() * 0.3;
        const speed = 1 + Math.random() * 2.5;
        this.particles.push({
          x: this.x, y: this.y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          size: 2 + Math.random() * 3,
          color: THEME.explosion[Math.floor(Math.random() * THEME.explosion.length)]
        });
      }
    }
  }
  update() {
    this.frame++;
    for (const p of this.particles) {
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.96;
      p.vy *= 0.96;
    }
    if (this.frame >= this.maxFrame) this.alive = false;
  }
  draw() {
    const progress = this.frame / this.maxFrame;
    const maxR = this.big ? 28 : 12;
    // 主体火焰
    const r = maxR * (progress < 0.4 ? progress * 2.5 : 2.5 - progress * 2.5);
    ctx.beginPath();
    ctx.arc(this.x, this.y, Math.max(1, r), 0, Math.PI * 2);
    ctx.fillStyle = progress < 0.2 ? THEME.explosion[0] : progress < 0.5 ? THEME.explosion[1] : THEME.explosion[2];
    ctx.globalAlpha = Math.max(0, 1 - progress * 1.2);
    ctx.fill();
    // 外圈光晕
    if (this.big && progress < 0.5) {
      ctx.beginPath();
      ctx.arc(this.x, this.y, Math.max(1, r * 1.8), 0, Math.PI * 2);
      ctx.fillStyle = THEME.explosion[1];
      ctx.globalAlpha = Math.max(0, 0.3 - progress * 0.6);
      ctx.fill();
    }
    // 碎片粒子
    for (const p of this.particles) {
      ctx.fillStyle = p.color;
      ctx.globalAlpha = Math.max(0, 1 - progress);
      ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    }
    ctx.globalAlpha = 1;
  }
}

// ========== 生成敌人 ==========
const SPAWN_POINTS = [
  { x: TILE / 2, y: TILE / 2 },
  { x: (COLS / 2) * TILE + TILE / 2, y: TILE / 2 },
  { x: (COLS - 1) * TILE + TILE / 2, y: TILE / 2 },
];

function spawnEnemy() {
  if (enemiesSpawned >= TOTAL_ENEMIES) return;
  if (enemies.filter(e => e.alive).length >= MAX_ENEMIES) return;

  // 尝试所有出生点，找到一个空闲的
  for (let i = 0; i < SPAWN_POINTS.length; i++) {
    const idx = (enemiesSpawned + i) % SPAWN_POINTS.length;
    const sp = SPAWN_POINTS[idx];
    if (canMoveTo(sp.x, sp.y, TANK_SIZE, null)) {
      const enemy = new Tank(sp.x, sp.y, DIR.DOWN, false);
      enemies.push(enemy);
      enemiesSpawned++;
      return;
    }
  }
}

// ========== 碰撞检测 ==========
function updateBullets(dt) {
  for (const b of bullets) {
    if (!b.alive) continue;
    const step = BULLET_SPEED * dt;
    b.x += DX[b.dir] * step;
    b.y += DY[b.dir] * step;

    // 出界
    if (b.x < 0 || b.x > W || b.y < 0 || b.y > H) {
      b.alive = false;
      continue;
    }

    // 撞墙
    const col = Math.floor(b.x / TILE);
    const row = Math.floor(b.y / TILE);
    if (row >= 0 && row < ROWS && col >= 0 && col < COLS) {
      const tile = map[row][col];
      if (tile === TILE_BRICK) {
        map[row][col] = TILE_EMPTY;
        mapDirty = true;
        b.alive = false;
        explosions.push(new Explosion(col * TILE + TILE / 2, row * TILE + TILE / 2, false));
        continue;
      }
      if (tile === TILE_STEEL) {
        b.alive = false;
        explosions.push(new Explosion(b.x, b.y, false));
        continue;
      }
      if (tile === TILE_BASE) {
        b.alive = false;
        bullets = bullets.filter(b2 => b2.alive);
        gameState = 'gameover';
        explosions.push(new Explosion(b.x, b.y, true));
        showOverlay('gameover');
        return;
      }
    }

    // 子弹打坦克
    if (b.owner === 'player') {
      for (const e of enemies) {
        if (!e.alive) continue;
        if (rectOverlap(b.x - BULLET_SIZE / 2, b.y - BULLET_SIZE / 2, BULLET_SIZE, BULLET_SIZE,
          e.x - TANK_SIZE / 2, e.y - TANK_SIZE / 2, TANK_SIZE, TANK_SIZE)) {
          e.alive = false;
          b.alive = false;
          score += 100;
          enemiesKilled++;
          explosions.push(new Explosion(e.x, e.y, true));
          if (enemiesKilled >= TOTAL_ENEMIES) {
            gameState = 'win';
            showOverlay('win');
          }
          break;
        }
      }
    } else {
      if (player && player.alive && player.invincible <= 0) {
        if (rectOverlap(b.x - BULLET_SIZE / 2, b.y - BULLET_SIZE / 2, BULLET_SIZE, BULLET_SIZE,
          player.x - TANK_SIZE / 2, player.y - TANK_SIZE / 2, TANK_SIZE, TANK_SIZE)) {
          b.alive = false;
          playerLives--;
          explosions.push(new Explosion(player.x, player.y, true));
          if (playerLives <= 0) {
            player.alive = false;
            gameState = 'gameover';
            showOverlay('gameover');
          } else {
            respawnPlayer();
          }
        }
      }
    }

    // 子弹碰子弹
    for (const b2 of bullets) {
      if (b2 === b || !b2.alive || !b.alive) continue;
      if (rectOverlap(b.x - BULLET_SIZE / 2, b.y - BULLET_SIZE / 2, BULLET_SIZE, BULLET_SIZE,
        b2.x - BULLET_SIZE / 2, b2.y - BULLET_SIZE / 2, BULLET_SIZE, BULLET_SIZE)) {
        b.alive = false;
        b2.alive = false;
      }
    }
  }
  bullets = bullets.filter(b => b.alive);
}

function respawnPlayer() {
  const spawnPoints = [
    tileCenter(COLS / 2, ROWS - 5),
    tileCenter(COLS / 2 - 3, ROWS - 2),
    tileCenter(COLS / 2 + 3, ROWS - 2),
  ];
  for (const sp of spawnPoints) {
    if (canMoveTo(sp.x, sp.y, TANK_SIZE, null)) {
      player = new Tank(sp.x, sp.y, DIR.UP, true);
      player.invincible = INVINCIBLE_TIME;
      return;
    }
  }
  // 所有候选点都被占，强制在主点复活并给更长无敌时间
  const sp = spawnPoints[0];
  player = new Tank(sp.x, sp.y, DIR.UP, true);
  player.invincible = INVINCIBLE_TIME + 1000;
}

// ========== 敌人 AI ==========
function updateEnemyAI(enemy, dt) {
  if (!enemy.alive) return;
  enemy.update(dt);

  enemy.aiDirTimer += dt;
  const needDirChange = enemy.aiDirTimer >= enemy.aiDirInterval;

  // 碰墙检测：尝试移动，如果移动失败则立刻换方向
  const oldX = enemy.x;
  const oldY = enemy.y;
  enemy.move(enemy.dir, dt);
  const stuck = (enemy.x === oldX && enemy.y === oldY);

  if (stuck) {
    enemy.triedDirs.push(enemy.dir);
  }

  if (stuck || needDirChange) {
    enemy.aiDirTimer = 0;
    enemy.aiDirInterval = 1000 + Math.random() * 2000;
    // 敌人越少追得越紧
    const remaining = TOTAL_ENEMIES - enemiesKilled;
    const chaseChance = Math.min(0.8, 0.3 + (1 - remaining / TOTAL_ENEMIES) * 0.5);
    if (player && player.alive && Math.random() < chaseChance) {
      const dx = player.x - enemy.x;
      const dy = player.y - enemy.y;
      if (Math.abs(dx) > Math.abs(dy)) {
        enemy.dir = dx > 0 ? DIR.RIGHT : DIR.LEFT;
      } else {
        enemy.dir = dy > 0 ? DIR.DOWN : DIR.UP;
      }
      enemy.triedDirs = [];
    } else {
      // 排除已试过的方向，避免反复撞同一面墙
      const allDirs = [DIR.UP, DIR.RIGHT, DIR.DOWN, DIR.LEFT];
      let available = allDirs.filter(d => !enemy.triedDirs.includes(d));
      if (available.length === 0) available = allDirs;
      enemy.dir = available[Math.floor(Math.random() * available.length)];
      enemy.triedDirs = [enemy.dir];
    }
  } else {
    enemy.triedDirs = [];
  }

  // 射击
  enemy.shoot();
}

// ========== 绘制地图（离屏缓存） ==========
function renderMapCache() {
  if (!mapCanvas) {
    mapCanvas = document.createElement('canvas');
    mapCanvas.width = W;
    mapCanvas.height = H;
  }
  const mctx = mapCanvas.getContext('2d');
  mctx.clearRect(0, 0, W, H);
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const tile = map[r][c];
      const x = c * TILE;
      const y = r * TILE;
      if (tile === TILE_BRICK) {
        mctx.fillStyle = THEME.brick.main;
        mctx.fillRect(x, y, TILE, TILE);
        mctx.fillStyle = THEME.brick.dark;
        mctx.fillRect(x, y, TILE / 2, TILE / 2);
        mctx.fillRect(x + TILE / 2, y + TILE / 2, TILE / 2, TILE / 2);
        mctx.strokeStyle = THEME.brick.border;
        mctx.lineWidth = 1;
        mctx.strokeRect(x, y, TILE, TILE);
      } else if (tile === TILE_STEEL) {
        mctx.fillStyle = THEME.steel.frame;
        mctx.fillRect(x, y, TILE, TILE);
        mctx.fillStyle = THEME.steel.mid;
        mctx.fillRect(x + 2, y + 2, TILE - 4, TILE - 4);
        mctx.fillStyle = THEME.steel.highlight;
        mctx.fillRect(x + 4, y + 4, TILE / 2 - 4, TILE / 2 - 4);
        mctx.fillRect(x + TILE / 2, y + TILE / 2, TILE / 2 - 4, TILE / 2 - 4);
      } else if (tile === TILE_BASE) {
        mctx.fillStyle = THEME.base.main;
        mctx.fillRect(x, y, TILE, TILE);
        mctx.fillStyle = THEME.base.inner;
        mctx.fillRect(x + 4, y + 4, TILE - 8, TILE - 8);
        mctx.fillStyle = THEME.base.main;
        mctx.font = '20px monospace';
        mctx.textAlign = 'center';
        mctx.textBaseline = 'middle';
        mctx.fillText('⚑', x + TILE / 2, y + TILE / 2);
      }
    }
  }
  mapDirty = false;
}

function drawMap() {
  if (mapDirty) renderMapCache();
  ctx.drawImage(mapCanvas, 0, 0);
  // 水面动画单独画（仅遍历水面瓦片）
  if (waterTiles.length > 0) {
    const offset = (Date.now() / 500) % 4;
    for (const w of waterTiles) {
      const x = w.c * TILE;
      const y = w.r * TILE;
      ctx.fillStyle = THEME.water.base;
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = THEME.water.wave;
      for (let i = 0; i < 3; i++) {
        ctx.fillRect(x, y + (i * 10 + offset) % TILE, TILE, 3);
      }
    }
  }
}

// ========== HUD（Canvas 绘制） ==========
function drawHUD() {
  const remaining = TOTAL_ENEMIES - enemiesKilled;
  const activeOnField = enemies.filter(e => e.alive).length;
  const lines = [
    `分数: ${score}`,
    `生命: ${'♥'.repeat(playerLives)}`,
    `敌人: 剩余${remaining} 场上${activeOnField}`,
    `已消灭: ${enemiesKilled}/${TOTAL_ENEMIES}`,
  ];
  ctx.font = '13px Courier New, monospace';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  const lineH = 18;
  const padX = 10;
  const padY = 10;
  const boxW = 200;
  const boxH = lines.length * lineH + padY * 2;
  // 背景框
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(padX - 4, padY - 4, boxW, boxH);
  ctx.strokeStyle = 'rgba(245,200,66,0.3)';
  ctx.lineWidth = 1;
  ctx.strokeRect(padX - 4, padY - 4, boxW, boxH);
  // 文字
  ctx.fillStyle = THEME.hud.color;
  for (let i = 0; i < lines.length; i++) {
    ctx.fillText(lines[i], padX + 4, padY + i * lineH + 4);
  }
}

// ========== Overlay ==========
function showOverlay(type) {
  overlay.style.display = 'flex';
  if (type === 'menu') {
    overlay.innerHTML = `
      <div class="title">坦克大战</div>
      <div class="info-box">
        <p><span class="key">W</span> <span class="key">A</span> <span class="key">S</span> <span class="key">D</span> / <span class="key">↑</span> <span class="key">↓</span> <span class="key">←</span> <span class="key">→</span>  移动</p>
        <p><span class="key">空格</span>  射击</p>
        <p><span class="key">P</span> / <span class="key">Esc</span>  暂停</p>
      </div>
      <div class="info-box">
        <p>消灭所有敌方坦克即可获胜</p>
        <p>砖墙可摧毁，钢墙不可摧毁</p>
        <p>保护基地，基地被毁则失败</p>
        <p>玩家 3 条生命，复活后短暂无敌</p>
      </div>
      <p class="start-hint">按 Enter 开始游戏</p>`;
  } else if (type === 'gameover') {
    overlay.innerHTML = `
      <div class="subtitle">游戏结束</div>
      <div class="info-box">
        <p class="score-line">最终分数: ${score}</p>
        <p>消灭敌人: ${enemiesKilled} / ${TOTAL_ENEMIES}</p>
      </div>
      <p class="start-hint">按 Enter 重新开始</p>`;
  } else if (type === 'win') {
    overlay.innerHTML = `
      <div class="win-title">胜利！</div>
      <div class="info-box">
        <p class="score-line">最终分数: ${score}</p>
        <p>消灭敌人: ${enemiesKilled} / ${TOTAL_ENEMIES}</p>
      </div>
      <p class="start-hint">按 Enter 重新开始</p>`;
  }
}

// ========== 初始化 ==========
function initGame() {
  initMap();
  score = 0;
  enemiesKilled = 0;
  enemiesSpawned = 0;
  playerLives = 3;
  lastEnemySpawn = 0;
  lastCleanup = 0;
  enemies = [];
  bullets = [];
  explosions = [];
  respawnPlayer();
  // 初始生成一些敌人
  spawnEnemy();
  spawnEnemy();
  spawnEnemy();
}

// ========== 主循环 ==========
let lastTime = 0;
function gameLoop(timestamp) {
  const dt = lastTime ? Math.min(timestamp - lastTime, MAX_DT) : 16;
  lastTime = timestamp;

  if (gameState === 'playing') {
    // 玩家输入
    if (player && player.alive) {
      player.update(dt);
      if (keys['ArrowUp'] || keys['KeyW']) { player.move(DIR.UP, dt); }
      else if (keys['ArrowDown'] || keys['KeyS']) { player.move(DIR.DOWN, dt); }
      else if (keys['ArrowLeft'] || keys['KeyA']) { player.move(DIR.LEFT, dt); }
      else if (keys['ArrowRight'] || keys['KeyD']) { player.move(DIR.RIGHT, dt); }

      if (keys['Space']) { player.shoot(); }
    }

    // 敌人 AI
    for (const e of enemies) {
      updateEnemyAI(e, dt);
    }

    // 生成新敌人
    lastEnemySpawn += dt;
    if (lastEnemySpawn >= RESPAWN_DELAY) {
      lastEnemySpawn = 0;
      spawnEnemy();
    }

    // 更新子弹
    updateBullets(dt);

    // 清理死亡敌人
    lastCleanup += dt;
    if (lastCleanup >= CLEANUP_INTERVAL) {
      lastCleanup = 0;
      enemies = enemies.filter(e => e.alive);
    }

    // 更新爆炸
    for (const e of explosions) e.update();
    explosions = explosions.filter(e => e.alive);
  }

  // 绘制
  ctx.fillStyle = THEME.bg;
  ctx.fillRect(0, 0, W, H);
  drawMap();
  for (const e of enemies) e.draw();
  if (player) player.draw();

  // 绘制子弹
  for (const b of bullets) {
    ctx.fillStyle = b.owner === 'player' ? THEME.bullet.player : THEME.bullet.enemy;
    ctx.fillRect(b.x - BULLET_SIZE / 2, b.y - BULLET_SIZE / 2, BULLET_SIZE, BULLET_SIZE);
  }

  // 绘制爆炸
  for (const e of explosions) e.draw();

  // HUD
  if (gameState === 'playing' || gameState === 'paused') drawHUD();

  requestAnimationFrame(gameLoop);
}

// ========== 输入 ==========
document.addEventListener('keydown', (e) => {
  keys[e.code] = true;
  if (e.code === 'Enter') {
    if (gameState === 'menu' || gameState === 'gameover' || gameState === 'win') {
      gameState = 'playing';
      overlay.style.display = 'none';
      initGame();
    }
  }
  // 暂停/继续
  if ((e.code === 'KeyP' || e.code === 'Escape') && (gameState === 'playing' || gameState === 'paused')) {
    if (gameState === 'playing') {
      gameState = 'paused';
      pauseOverlay.style.display = 'flex';
    } else {
      gameState = 'playing';
      pauseOverlay.style.display = 'none';
      lastTime = 0; // 重置帧时间，避免恢复时dt跳变
    }
  }
  // 防止方向键和空格滚动页面
  if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) {
    e.preventDefault();
  }
});

document.addEventListener('keyup', (e) => {
  keys[e.code] = false;
});

// ========== 启动 ==========
showOverlay('menu');
requestAnimationFrame(gameLoop);
</script>
</body>
